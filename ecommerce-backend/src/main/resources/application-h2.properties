spring.datasource.url=jdbc:h2:mem:ecommerce_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Security
jwt.secret=${JWT_SECRET}
jwt.expirationMs=3600000
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.public.key=${STRIPE_PUBLIC_KEY}
stripe.success.url=${STRIPE_SUCCESS_URL:http://localhost:4200/checkout?payment=success}
stripe.cancel.url=${STRIPE_CANCEL_URL:http://localhost:4200/checkout?payment=cancel}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
