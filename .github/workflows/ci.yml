name: E-Commerce Platform CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build and Test Backend
        run: |
          cd ecommerce-backend
          ./mvnw clean test -DskipTests=false
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'dummy-secret-for-ci-testing-purposes-only' }}

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ecommerce-frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd ecommerce-frontend
          npm ci
      - name: Build Frontend
        run: |
          cd ecommerce-frontend
          npm run build -- --configuration=production

  ai-service-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd ecommerce-backend/ai-service
          pip install -r requirements.txt
          if [ -f tests/requirements.txt ]; then pip install -r tests/requirements.txt; fi
      - name: Run AI Service Tests
        run: |
          cd ecommerce-backend/ai-service
          export ANALYTICS_INTERNAL_API_KEY=test-key
          pytest tests/

